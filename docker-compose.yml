version: '3.8'

services:

  nginx:
    image: nginx:alpine
    container_name: git-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    restart: always

  api:
    image: tiangolo/uvicorn-gunicorn-fastapi:python3.11
    container_name: git-api
    ports:
      - "8000:80"
    environment:
      - DATABASE_URL=postgresql://git:GitLabCloud2026@db:5432/labcloud
      - REDIS_URL=redis://redis:6379
    depends_on:
      - db
      - redis
    restart: always

  db:
    image: postgres:16-alpine
    container_name: git-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=labcloud
      - POSTGRES_USER=git
      - POSTGRES_PASSWORD=GitLabCloud2026
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    container_name: git-redis
    ports:
      - "6379:6379"
    restart: always

  grafana:
    image: grafana/grafana:latest
    container_name: git-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=GitLabCloud2026
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
    restart: always

  prometheus:
    image: prom/prometheus:latest
    container_name: git-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    restart: always

volumes:
  postgres_data:
  grafana_data:
