name: CI/CD — GIT Lab Cloud

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # ─────────────────────────────────────────
  # JOB 1 : Validation des fichiers
  # ─────────────────────────────────────────
  validate:
    name: Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Vérifier docker-compose.yml
        run: |
          docker compose -f docker-compose.yml config > /dev/null
          echo "✅ docker-compose.yml valide"

      - name: Vérifier nginx.conf
        run: |
          docker run --rm -v ${{ github.workspace }}/nginx.conf:/etc/nginx/nginx.conf:ro nginx:alpine nginx -t
          echo "✅ nginx.conf valide"

      - name: Vérifier prometheus.yml
        run: |
          docker run --rm -v ${{ github.workspace }}/prometheus.yml:/etc/prometheus/prometheus.yml prom/prometheus:latest promtool check config /etc/prometheus/prometheus.yml
          echo "✅ prometheus.yml valide"

  # ─────────────────────────────────────────
  # JOB 2 : Déploiement sur la VM Infomaniak
  # ─────────────────────────────────────────
  deploy:
    name: Déploiement
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configurer la clé SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Copier les fichiers sur la VM
        run: |
          scp -i ~/.ssh/deploy_key \
            docker-compose.yml \
            nginx.conf \
            prometheus.yml \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/home/ubuntu/git-lab-cloud/

      - name: Déployer la stack Docker
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            cd /home/ubuntu/git-lab-cloud
            docker compose pull
            docker compose up -d --remove-orphans
            docker compose ps
            echo "✅ Stack déployée avec succès"
          EOF

      - name: Vérifier les conteneurs
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            echo "=== Conteneurs en cours ==="
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
          EOF
